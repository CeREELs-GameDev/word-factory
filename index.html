<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Word Factory</title>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; overflow:hidden; background:#3a2c1c; touch-action:none;
    -webkit-user-select:none; user-select:none;
    font-family:'Baloo 2', 'Comic Sans MS', 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; }

  #stage { position:absolute; width:1280px; height:720px; transform-origin:0 0; }
  #scene { position:absolute; inset:0; overflow:hidden;
    background:
      radial-gradient(ellipse 56% 36% at 50% 4%, #ffdf9e59, #ffdf9e00 72%),
      radial-gradient(ellipse 135% 105% at 50% 42%, #00000000 52%, #4a2f1a4f 100%),
      repeating-linear-gradient(104deg, #00000007 0 2px, #00000000 2px 30px),
      linear-gradient(#ead5ba 0%, #e2c9a9 59%, #c9a173 59%, #ba8f5d 100%);
  }
  #scene::before { content:''; position:absolute; left:0; right:0; top:0; height:78px; z-index:0;
    background:repeating-linear-gradient(90deg, #00000012 0 3px, #00000000 3px 96px), linear-gradient(#dcc09b,#d2b58e);
    border-bottom:4px solid #33323e2b; }
  #scene::after { content:''; position:absolute; left:0; right:0; top:59%; bottom:0; z-index:0;
    background:repeating-linear-gradient(90deg, #00000010 0 3px, #00000000 3px 118px); }
  #scene.shake { animation: shake .35s linear; }
  @keyframes shake {
    0%,100% { transform:translate(0,0); }
    20% { transform:translate(-9px,5px); } 40% { transform:translate(8px,-5px); }
    60% { transform:translate(-6px,3px); } 80% { transform:translate(4px,-2px); }
  }

  /* ── 천장 램프 + 나무 간판 ── */
  #lamp { position:absolute; left:50%; top:0; transform:translateX(-50%); width:150px; height:62px; z-index:4;
    background:linear-gradient(#33323e,#33323e) 50% 0/6px 20px no-repeat; }
  #lamp::before { content:''; position:absolute; left:50%; top:16px; transform:translateX(-50%);
    width:150px; height:34px; background:linear-gradient(#6a7186,#555b6e); border:4px solid #33323e;
    border-radius:10px 10px 75px 75px / 10px 10px 30px 30px; }
  #lamp::after { content:''; position:absolute; left:50%; top:42px; transform:translateX(-50%);
    width:28px; height:18px; border-radius:50%; background:#ffeaae;
    box-shadow:0 0 30px 14px #ffd97066; }
  #sign { position:absolute; left:50%; top:64px; transform:translateX(-50%);
    background:repeating-linear-gradient(90deg, #ffffff12 0 4px, #00000000 4px 56px), linear-gradient(#d8a86b,#c8954f);
    border:4px solid #33323e; border-radius:10px;
    color:#3c2a14; padding:6px 28px; font-size:29px; font-weight:800; letter-spacing:4px;
    box-shadow:0 5px 12px #00000033, inset 0 2px 0 #ffffff3d; z-index:4; }
  #sign::before, #sign::after { content:''; position:absolute; top:-18px; width:4px; height:18px; background:#8a6234; }
  #sign::before { left:26px; } #sign::after { right:26px; }

  /* ── 컨베이어 벨트 ── */
  #belt { position:absolute; z-index:10; pointer-events:none; }
  #beltBand { position:absolute; inset:0; border-radius:18px; overflow:hidden;
    border:5px solid #33323e; box-shadow:0 10px 22px #00000040, inset 0 4px 0 #ffffff1a; }
  #beltStripes { position:absolute; inset:0;
    background:repeating-linear-gradient(90deg, #5f6880 0 44px, #6d7790 44px 88px); }
  #beltStripes::after { content:''; position:absolute; inset:0;
    background:linear-gradient(#ffffff14, #00000000 30%, #00000033); }
  #beltLegs { position:absolute; pointer-events:none; }
  .leg { position:absolute; top:0; width:22px; height:100%; background:linear-gradient(90deg,#454a5e,#565c72,#454a5e); border-radius:0 0 6px 6px; box-shadow:inset 0 0 0 3px #33323e55; }

  /* ── 카테고리 상자 (나무 궤짝) ── */
  .bin { position:absolute; border-radius:10px; z-index:20;
    border:5px solid #33323e;
    background:
      repeating-linear-gradient(0deg, #00000000 0 30px, #00000017 30px 34px),
      repeating-linear-gradient(90deg, #ffffff14 0 4px, #00000000 4px 58px),
      linear-gradient(#d8a86b,#c8954f);
    box-shadow:0 6px 0 #00000022, inset 0 3px 0 #ffffff36;
    transition:transform .12s ease, box-shadow .12s ease; }
  .bin .stripe { position:absolute; left:0; right:0; top:0; height:18px;
    background:var(--c); border-bottom:4px solid #33323e; border-radius:5px 5px 0 0; }
  .bin .label { position:absolute; left:50%; bottom:12px; transform:translateX(-50%);
    background:#f6edd4; color:var(--d); border:3px solid #33323e; border-radius:8px;
    padding:3px 14px; font-size:21px; font-weight:800; letter-spacing:1px; white-space:nowrap;
    box-shadow:0 3px 0 #00000026; transform:translateX(-50%) rotate(-1.5deg); }
  .bin .slot { position:absolute; left:10%; top:32px; width:80%; height:16px; border-radius:8px;
    background:#00000066; box-shadow:inset 0 3px 6px #000000aa; }
  .bin.hover { transform:scale(1.06); box-shadow:0 0 0 5px var(--c), 0 8px 20px #00000044; }
  .bin.pop { animation:binPop .35s ease; }
  @keyframes binPop { 30% { transform:scale(1.12); } 100% { transform:scale(1); } }
  .bin.wrong { animation:binWrong .4s ease; }
  @keyframes binWrong {
    0%,100% { transform:translateX(0); box-shadow:0 0 0 5px #ff3b3bcc; }
    25% { transform:translateX(-10px); } 50% { transform:translateX(9px); } 75% { transform:translateX(-6px); }
  }

  /* ── 쓰레기통 ── */
  #trash { position:absolute; z-index:6; }
  #trashCan { position:absolute; left:6px; right:6px; top:22px; bottom:0; border-radius:8px 8px 12px 12px;
    background:repeating-linear-gradient(90deg, #707a8c 0 16px, #5f6878 16px 32px);
    border:4px solid #33323e; box-shadow:inset 0 4px 0 #ffffff22, 0 6px 12px #00000033; }
  #trashCan .tlabel { position:absolute; left:50%; top:46%; transform:translate(-50%,-50%) rotate(-4deg);
    background:#f6edd4; color:#41382b; border:2px solid #33323e; border-radius:6px;
    padding:2px 8px; font-size:15px; font-weight:800; letter-spacing:1px; }
  #trashLid { position:absolute; left:0; right:0; top:0; height:24px; border-radius:10px;
    background:linear-gradient(#8a93a3,#6a7384); border:4px solid #33323e;
    transform-origin:8% 100%; transition:transform .16s ease; box-shadow:0 3px 6px #00000033; z-index:2; }
  #trashLid::after { content:''; position:absolute; left:50%; top:-7px; transform:translateX(-50%);
    width:30px; height:8px; border-radius:5px; background:#6a7384; border:3px solid #33323e; }
  #trash.open #trashLid { transform:rotate(-38deg) translate(-4px,-8px); }
  #trash.wrong #trashCan { animation:binWrong .4s ease; }

  /* ── 직원 ── */
  #worker { position:absolute; z-index:5; animation:idleBob 2.4s ease-in-out infinite; }
  @keyframes idleBob { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
  #worker.happy { animation:happyJump .55s ease; }
  @keyframes happyJump { 30% { transform:translateY(-26px); } 60% { transform:translateY(0); } 78% { transform:translateY(-10px); } 100% { transform:translateY(0); } }

  /* ── 단어 태그 ── */
  .item { position:absolute; left:0; top:0; z-index:30; padding:7px 18px 7px 26px;
    background:linear-gradient(#faf2dc,#f0e3c2); border:4px solid #33323e; border-radius:10px;
    font-family:'Patrick Hand','Comic Sans MS',sans-serif; font-size:31px; font-weight:400;
    color:#33323e; letter-spacing:.5px; white-space:nowrap;
    box-shadow:0 6px 0 #00000026, inset 0 2px 0 #ffffff8c; cursor:grab; will-change:transform; }
  .item::before { content:''; position:absolute; left:9px; top:50%; margin-top:-5px;
    width:8px; height:8px; border-radius:50%; background:#33323e; box-shadow:inset 0 1px 2px #000; }
  .item.drag { cursor:grabbing; z-index:50; box-shadow:0 20px 26px #00000040, inset 0 2px 0 #ffffff8c; }

  /* ── 이펙트 캔버스 / 플로터 ── */
  #fx { position:absolute; inset:0; z-index:60; pointer-events:none; }
  .floater { position:absolute; z-index:65; pointer-events:none; font-weight:800; font-size:30px;
    text-shadow:0 2px 0 #ffffff99; transform:translate(-50%,-50%);
    animation:floatUp 1s ease-out forwards; white-space:nowrap; }
  @keyframes floatUp { 0% { opacity:0; margin-top:8px; } 12% { opacity:1; margin-top:0; }
    100% { opacity:0; margin-top:-78px; } }

  /* ── HUD ── */
  #hud { position:absolute; inset:0; z-index:70; pointer-events:none; }
  #hearts { position:absolute; left:30px; top:14px; display:flex; gap:8px; }
  .heart { width:32px; height:30px; position:relative; transition:filter .2s, transform .2s;
    filter:drop-shadow(0 2px 0 #33323e55); }
  .heart::before, .heart::after { content:''; position:absolute; width:18px; height:28px;
    background:#e8556d; border-radius:10px 10px 0 0; top:0; }
  .heart::before { left:8px; transform:rotate(-45deg); transform-origin:0 100%; }
  .heart::after { left:-2px; transform:rotate(45deg); transform-origin:100% 100%; }
  .heart.off { filter:grayscale(1) brightness(.45); transform:scale(.82); }
  #scoreBox { position:absolute; right:34px; top:10px; text-align:right; }
  #score { font-size:44px; font-weight:800; color:#41382b; text-shadow:0 2px 0 #ffffff80; }
  #score.punch { animation:scorePunch .25s ease; }
  @keyframes scorePunch { 40% { transform:scale(1.22); } 100% { transform:scale(1); } }
  #combo { font-size:22px; font-weight:800; color:#c8780f; min-height:28px; text-shadow:0 2px 0 #ffffff80; }
  #timer { position:absolute; left:50%; top:132px; transform:translateX(-50%);
    font-size:38px; font-weight:800; color:#41382b;
    background:#f6edd4; border:3px solid #33323e; border-radius:12px; padding:0 20px;
    box-shadow:0 4px 0 #00000022; }
  #timer.low { color:#e23b3b; animation:timerPulse 1s ease infinite; }
  @keyframes timerPulse { 0%,100% { transform:translateX(-50%) scale(1); } 50% { transform:translateX(-50%) scale(1.16); } }

  /* ── 오버레이 ── */
  #overlay { position:absolute; inset:0; z-index:100; display:flex; align-items:center; justify-content:center;
    background:#3a2c1cd6; backdrop-filter:blur(3px); }
  #overlay.hidden { display:none; }
  .card { background:linear-gradient(#faf2dc,#f0e3c2); border:4px solid #33323e; border-radius:18px;
    padding:40px 60px; text-align:center; color:#41382b; box-shadow:0 16px 50px #00000066; max-width:760px; }
  .card h1 { font-size:52px; letter-spacing:5px; color:#c8780f; margin-bottom:18px; text-shadow:0 3px 0 #ffffff80; }
  .card p { font-size:21px; line-height:1.65; margin-bottom:10px; color:#5a4d38; }
  .card .small { font-size:17px; color:#8a7a5e; }
  .card .big { font-size:40px; font-weight:800; color:#33323e; margin:10px 0 4px; }
  .btn { margin-top:24px; padding:14px 60px; font-size:26px; font-weight:800; letter-spacing:2px;
    font-family:inherit; color:#3a2d12; background:linear-gradient(#ffd95e,#f0b929);
    border:4px solid #33323e; border-radius:14px;
    cursor:pointer; box-shadow:0 6px 0 #33323e, 0 12px 22px #00000033; transition:transform .08s, box-shadow .08s; }
  .btn:hover { transform:translateY(-2px); }
  .btn:active { transform:translateY(4px); box-shadow:0 2px 0 #33323e; }
</style>
</head>
<body>
<div id="stage">
  <div id="scene">
    <div id="lamp"></div>
    <div id="sign">WORD FACTORY</div>
    <div id="beltLegs"></div>

    <svg id="worker" width="150" height="216" viewBox="0 0 150 216">
      <ellipse cx="75" cy="206" rx="44" ry="9" fill="#00000033"/>
      <ellipse cx="75" cy="152" rx="44" ry="56" fill="#3f72b0" stroke="#33323e" stroke-width="4"/>
      <rect x="55" y="128" width="40" height="34" rx="8" fill="#365f93" stroke="#33323e" stroke-width="3"/>
      <circle cx="75" cy="72" r="34" fill="#f2c9a0" stroke="#33323e" stroke-width="4"/>
      <path d="M41 62 a34 34 0 0 1 68 0 z" fill="#f6c945" stroke="#33323e" stroke-width="4"/>
      <rect x="31" y="56" width="88" height="11" rx="5.5" fill="#f6c945" stroke="#33323e" stroke-width="3"/>
      <circle cx="62" cy="78" r="8" fill="#fff" stroke="#33323e" stroke-width="2"/>
      <circle cx="89" cy="78" r="8" fill="#fff" stroke="#33323e" stroke-width="2"/>
      <circle id="pupilL" cx="62" cy="78" r="3.6" fill="#222"/>
      <circle id="pupilR" cx="89" cy="78" r="3.6" fill="#222"/>
      <path id="mouth" d="M66 94 q9 7 18 0" fill="none" stroke="#33323e" stroke-width="3" stroke-linecap="round"/>
    </svg>

    <div id="trash">
      <div id="trashLid"></div>
      <div id="trashCan"><div class="tlabel">TRASH</div></div>
    </div>

    <div id="belt">
      <div id="beltBand"><div id="beltStripes"></div></div>
    </div>

    <div id="bins"></div>
    <div id="items"></div>
    <canvas id="fx" width="1280" height="720"></canvas>

    <div id="hud">
      <div id="hearts"></div>
      <div id="timer"></div>
      <div id="scoreBox"><div id="score">0</div><div id="combo"></div></div>
    </div>

    <div id="overlay"></div>
  </div>
</div>

<script>
'use strict';
/* =====================================================================
   WORD FACTORY — 컨베이어 단어 분류 게임 (프로토타입)
   데이터·좌표는 아래 상단 블록에서만 수정 (디자인 교체 대비)
   ===================================================================== */

// ── 레이아웃 좌표 (1280x720 디자인 기준) ──
const LAYOUT = {
  stage : { w:1280, h:720 },
  belt  : { x0:260, x1:1300, surfaceY:404, bandTop:424, bandH:78, spawnX:1345, failX:302 },
  trash : { x:432, y:266, w:112, h:158 },          // 드롭 판정 영역
  worker: { x:262, y:424 },                         // 발끝 기준
  bins  : [                                         // 카테고리 순서대로 매핑
    { x:28, y:62,  w:198, h:142 },
    { x:28, y:222, w:198, h:142 },
    { x:28, y:382, w:198, h:142 },
    { x:28, y:542, w:198, h:142 },
  ],
};

// ── 게임 밸런스 ──
const CONFIG = {
  lives: 3,
  duration: 90,                                       // 라운드 제한 시간(초)
  speedStart: 75,  speedRamp: 1.7,  speedMax: 225,   // 벨트 속도 px/s
  spawnStart: 2.6, spawnMin: 1.2,   spawnRamp: 0.016, // 생성 간격(초)
  trapChance: 0.25, trapGraceSec: 9,                  // 함정 비율·초반 유예
  throwMinSpeed: 540, gravity: 2700,                  // 던지기 판정·중력
  comboMax: 5,
};

// ── 단어 데이터 (임시 — 추후 전달분으로 교체) ──
const CATEGORIES = [
  { id:'fruit',  label:'FRUIT',  c:'#f6c945', d:'#a87f14', d2:'#dca92c',
    words:['apple','banana','grape','orange','peach','lemon','cherry','melon'] },
  { id:'animal', label:'ANIMAL', c:'#7ec850', d:'#487c24', d2:'#67ad3c',
    words:['dog','cat','lion','horse','rabbit','tiger','panda','sheep'] },
  { id:'color',  label:'COLOR',  c:'#b07ce8', d:'#6f3fa8', d2:'#9763cf',
    words:['red','blue','green','pink','purple','brown','black','yellow'] },
  { id:'school', label:'SCHOOL', c:'#f08a4b', d:'#a8501a', d2:'#d67434',
    words:['book','pencil','desk','chair','eraser','ruler','paper','crayon'] },
];
const TRAPS = [   // bad: 표기 오류 단어, good: 올바른 철자
  { bad:'aple',    good:'apple'  }, { bad:'bananna', good:'banana' },
  { bad:'orenge',  good:'orange' }, { bad:'cherri',  good:'cherry' },
  { bad:'tigar',   good:'tiger'  }, { bad:'rabit',   good:'rabbit' },
  { bad:'shepe',   good:'sheep'  }, { bad:'gren',    good:'green'  },
  { bad:'yelow',   good:'yellow' }, { bad:'purpel',  good:'purple' },
  { bad:'pancil',  good:'pencil' }, { bad:'chare',   good:'chair'  },
  { bad:'erasor',  good:'eraser' }, { bad:'bok',     good:'book'   },
];

/* ===================== 이하 엔진 ===================== */

const $ = id => document.getElementById(id);
const stage = $('stage'), scene = $('scene');
const itemsEl = $('items'), binsEl = $('bins'), fx = $('fx'), ctx = fx.getContext('2d');
const overlayEl = $('overlay'), scoreEl = $('score'), comboEl = $('combo'), heartsEl = $('hearts');
const trashEl = $('trash'), workerEl = $('worker');
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rand = (a,b) => a + Math.random()*(b-a);

// ── 스테이지 스케일 ──
let scale = 1;
function resize(){
  const w = innerWidth, h = innerHeight;
  scale = Math.min(w/LAYOUT.stage.w, h/LAYOUT.stage.h);
  stage.style.transform = `scale(${scale})`;
  stage.style.left = (w - LAYOUT.stage.w*scale)/2 + 'px';
  stage.style.top  = (h - LAYOUT.stage.h*scale)/2 + 'px';
}
addEventListener('resize', resize); resize();

// ── 고정 배치 ──
(function placeScenery(){
  const B = LAYOUT.belt;
  const belt = $('belt');
  belt.style.left = (B.x0-20)+'px'; belt.style.top = B.bandTop+'px';
  belt.style.width = (B.x1-B.x0+40)+'px'; belt.style.height = B.bandH+'px';
  const legs = $('beltLegs');
  legs.style.left = (B.x0-20)+'px'; legs.style.top = (B.bandTop+B.bandH-6)+'px';
  legs.style.width = (B.x1-B.x0+40)+'px'; legs.style.height = '170px';
  for (let i=0; i<6; i++){
    const leg = document.createElement('div'); leg.className = 'leg';
    leg.style.left = (40 + i*190) + 'px'; legs.appendChild(leg);
  }
  const T = LAYOUT.trash;
  trashEl.style.left = T.x+'px'; trashEl.style.top = T.y+'px';
  trashEl.style.width = T.w+'px'; trashEl.style.height = T.h+'px';
  workerEl.style.left = (LAYOUT.worker.x-75)+'px';
  workerEl.style.top  = (LAYOUT.worker.y-212)+'px';

  CATEGORIES.forEach((cat,i)=>{
    const r = LAYOUT.bins[i];
    const el = document.createElement('div');
    el.className = 'bin'; el.dataset.cat = cat.id;
    el.style.cssText = `left:${r.x}px;top:${r.y}px;width:${r.w}px;height:${r.h}px;--c:${cat.c};--d:${cat.d};--d2:${cat.d2};`;
    el.innerHTML = `<div class="stripe"></div><div class="slot"></div><div class="label">${cat.label}</div>`;
    binsEl.appendChild(el);
    cat.el = el; cat.rect = r;
  });
})();

// ── 사운드 (WebAudio 합성) ──
let AC = null, master = null;
function initAudio(){
  if (AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  master = AC.createGain(); master.gain.value = 0.5; master.connect(AC.destination);
  // 공장 저음 험 (벨트 구동음)
  const len = AC.sampleRate*2, buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0); let last = 0;
  for (let i=0; i<len; i++){ last = (last + (Math.random()*2-1)*0.04) * 0.98; d[i] = last*3; }
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 110;
  const g = AC.createGain(); g.gain.value = 0.05;
  src.connect(lp); lp.connect(g); g.connect(master); src.start();
}
function tone(freq, dur, type='sine', vol=0.2, slideTo=null, delay=0){
  if (!AC) return;
  const t0 = AC.currentTime + delay;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type; o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0+dur);
  g.gain.setValueAtTime(vol, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  o.connect(g); g.connect(master); o.start(t0); o.stop(t0+dur+0.02);
}
function noiseBurst(dur, vol, freq, type='lowpass', delay=0){
  if (!AC) return;
  const t0 = AC.currentTime + delay;
  const len = Math.ceil(AC.sampleRate*dur), buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const f = AC.createBiquadFilter(); f.type = type; f.frequency.value = freq;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(f); f.connect(g); g.connect(master); src.start(t0);
}
const SFX = {
  pickup : ()=>{ tone(520, .06, 'triangle', .16); },
  drop   : ()=>{ noiseBurst(.06, .16, 420); },
  correct: ()=>{ tone(660, .09, 'sine', .25); tone(880, .14, 'sine', .25, null, .07); noiseBurst(.04, .1, 2400, 'highpass'); },
  trash  : ()=>{ noiseBurst(.13, .4, 800); tone(170, .1, 'square', .14); tone(720, .05, 'triangle', .1, null, .03); },
  wrong  : ()=>{ tone(150, .3, 'sawtooth', .22, 88); },
  miss   : ()=>{ tone(320, .4, 'sine', .2, 105); },
  throw_ : ()=>{ noiseBurst(.14, .12, 1600, 'bandpass'); },
  tick   : ()=>{ tone(980, .05, 'square', .12); },
  timeup : ()=>{ tone(520, .25, 'triangle', .25); tone(390, .3, 'triangle', .25, null, .22); tone(260, .5, 'triangle', .25, null, .44); },
};

// ── 파티클 ──
const P = [];
function burst(x, y, colors, n, opt={}){
  for (let i=0; i<n; i++){
    const a = opt.angle!=null ? opt.angle + rand(-opt.spread||-.6, opt.spread||.6) : rand(0, Math.PI*2);
    const sp = rand(opt.spMin||120, opt.spMax||420);
    P.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp - (opt.up||160),
      life:0, max:rand(.45,.85), size:rand(4,9), rot:rand(0,6.28), vr:rand(-9,9),
      color:colors[(Math.random()*colors.length)|0], g:opt.g!=null?opt.g:1300,
      shape:opt.shape||'rect' });
  }
}
function dust(x, y){
  for (let i=0; i<7; i++)
    P.push({ x:x+rand(-14,14), y:y+rand(-4,4), vx:rand(-50,50), vy:rand(-90,-20),
      life:0, max:rand(.4,.7), size:rand(5,11), rot:0, vr:0, color:'#bba98e', g:-40, shape:'circle' });
}
function drawParticles(dt){
  ctx.clearRect(0, 0, 1280, 720);
  for (let i=P.length-1; i>=0; i--){
    const p = P[i]; p.life += dt;
    if (p.life >= p.max){ P.splice(i,1); continue; }
    p.vy += p.g*dt; p.x += p.vx*dt; p.y += p.vy*dt; p.rot += p.vr*dt;
    const k = 1 - p.life/p.max;
    ctx.save(); ctx.globalAlpha = k; ctx.translate(p.x, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = p.color;
    if (p.shape === 'circle'){ ctx.beginPath(); ctx.arc(0, 0, p.size*k+1, 0, 6.29); ctx.fill(); }
    else ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.7);
    ctx.restore();
  }
}

// ── 플로터 텍스트 ──
function floater(x, y, text, color='#fff', size=30){
  const el = document.createElement('div');
  el.className = 'floater'; el.textContent = text;
  el.style.cssText = `left:${x}px;top:${y}px;color:${color};font-size:${size}px;`;
  scene.appendChild(el);
  setTimeout(()=>el.remove(), 1050);
}

// ── 게임 상태 ──
let state = 'menu';           // menu | playing | over
let items = [], drag = null;
let score = 0, combo = 1, lives = CONFIG.lives, tPlay = 0, spawnTimer = 0;
let timeLeft = CONFIG.duration, lastTickSec = -1;
let stripeOffset = 0;
const timerEl = $('timer');
const pointer = { x:640, y:360 };
const beltY = LAYOUT.belt.surfaceY;

function beltSpeed(){ return Math.min(CONFIG.speedMax, CONFIG.speedStart + tPlay*CONFIG.speedRamp); }
function spawnGap(){ return Math.max(CONFIG.spawnMin, CONFIG.spawnStart - tPlay*CONFIG.spawnRamp); }

// ── 단어 생성 ──
function spawnItem(){
  const active = new Set(items.map(i=>i.word));
  let word=null, cat=null, fix=null;
  for (let tries=0; tries<24 && word===null; tries++){
    const isTrap = tPlay > CONFIG.trapGraceSec && Math.random() < CONFIG.trapChance;
    if (isTrap){
      const tr = TRAPS[(Math.random()*TRAPS.length)|0];
      if (!active.has(tr.bad)){ word = tr.bad; fix = tr.good; cat = null; }
    } else {
      const c = CATEGORIES[(Math.random()*CATEGORIES.length)|0];
      const w = c.words[(Math.random()*c.words.length)|0];
      if (!active.has(w)){ word = w; cat = c.id; }
    }
  }
  if (word === null) return;
  const el = document.createElement('div');
  el.className = 'item'; el.textContent = word;
  itemsEl.appendChild(el);
  const it = { el, word, cat, fix, trap:!!fix,
    x:LAYOUT.belt.spawnX, y:beltY, vx:0, vy:0, rot:rand(-3,3),
    mode:'belt', bob:rand(0,6.28), spawnT:0, squash:0,
    grabDX:0, grabDY:0, tw:null, fade:1 };
  el.addEventListener('pointerdown', e => grabItem(e, it));
  items.push(it);
}

// ── 드래그 ──
function toDesign(e){
  const r = stage.getBoundingClientRect();
  return { x:(e.clientX - r.left)/scale, y:(e.clientY - r.top)/scale };
}
function grabItem(e, it){
  if (state !== 'playing' || drag) return;
  if (it.mode === 'resolve' || it.mode === 'fall') return;
  e.preventDefault();
  const p = toDesign(e);
  pointer.x = p.x; pointer.y = p.y;
  drag = it; it.mode = 'drag'; it.vx = 0; it.vy = 0; it.tw = null;
  it.grabDX = clamp(it.x - p.x, -60, 60); it.grabDY = clamp(it.y - p.y, -30, 30);
  it.el.classList.add('drag');
  SFX.pickup();
}
addEventListener('pointermove', e => {
  const p = toDesign(e); pointer.x = p.x; pointer.y = p.y;
});
addEventListener('pointerup', releaseDrag);
addEventListener('pointercancel', releaseDrag);
addEventListener('blur', releaseDrag);
function releaseDrag(){
  if (!drag) return;
  const it = drag; drag = null;
  it.el.classList.remove('drag');
  if (state !== 'playing'){ startReturn(it); return; }
  const t = hitTarget(it);
  if (t) resolveDrop(it, t);
  else if (Math.hypot(it.vx, it.vy) > CONFIG.throwMinSpeed){
    it.mode = 'throw'; it.noHitT = 0; SFX.throw_();
  } else startReturn(it);
}

// ── 드롭 판정 ──
function inRect(x, y, r, pad=10){
  return x > r.x-pad && x < r.x+r.w+pad && y > r.y-pad && y < r.y+r.h+pad;
}
function hitTarget(it){
  if (inRect(it.x, it.y, LAYOUT.trash)) return { type:'trash' };
  for (const c of CATEGORIES)
    if (inRect(it.x, it.y, c.rect)) return { type:'bin', cat:c };
  return null;
}
function resolveDrop(it, t){
  if (t.type === 'trash'){
    if (it.trap) successTrash(it);
    else failDrop(it, trashEl, `It's a real word!`);
  } else {
    if (!it.trap && it.cat === t.cat.id) successBin(it, t.cat);
    else if (it.trap) failDrop(it, t.cat.el, `Spelling! → ${it.fix}`);
    else {
      const real = CATEGORIES.find(c=>c.id===it.cat);
      failDrop(it, t.cat.el, `${real.label}!`);
    }
  }
}
function addScore(n){
  score += n;
  scoreEl.textContent = score;
  scoreEl.classList.remove('punch'); void scoreEl.offsetWidth;
  scoreEl.classList.add('punch');
}
function bumpCombo(){
  combo = Math.min(CONFIG.comboMax, combo+1);
  comboEl.textContent = combo > 1 ? `COMBO x${combo}` : '';
}
function resetCombo(){ combo = 1; comboEl.textContent = ''; }

function successBin(it, cat){
  const r = cat.rect, cx = r.x+r.w/2, cy = r.y+r.h/2;
  addScore(100*combo);
  floater(cx+r.w/2+70, cy-20, `+${100*combo}`, cat.d);
  bumpCombo();
  cat.el.classList.remove('pop'); void cat.el.offsetWidth; cat.el.classList.add('pop');
  burst(cx, r.y+22, [cat.c, '#ffffff', cat.d2], 18, { up:260, spMin:80, spMax:330 });
  SFX.correct();
  startResolve(it, cx, r.y+26);
}
function successTrash(it){
  const T = LAYOUT.trash, cx = T.x+T.w/2;
  addScore(150*combo);
  floater(cx, T.y-44, `+${150*combo}  (${it.fix})`, '#3f8f2f', 26);
  bumpCombo();
  trashEl.classList.add('open');
  setTimeout(()=>trashEl.classList.remove('open'), 350);
  workerEl.classList.remove('happy'); void workerEl.offsetWidth; workerEl.classList.add('happy');
  burst(cx, T.y+10, ['#8b93a8','#c8cdd8','#6b7484'], 10, { up:200, spMin:60, spMax:220 });
  SFX.trash();
  startResolve(it, cx, T.y+30);
}
function failDrop(it, flashEl, msg){
  flashEl.classList.remove('wrong'); void flashEl.offsetWidth; flashEl.classList.add('wrong');
  scene.classList.remove('shake'); void scene.offsetWidth; scene.classList.add('shake');
  burst(it.x, it.y, ['#ff5252','#ff8a65'], 12, { up:140, spMin:60, spMax:260 });
  floater(it.x+40, it.y-50, msg, '#e23b3b', 26);
  SFX.wrong();
  loseLife();
  if (state === 'playing') startReturn(it);
}
function loseLife(){
  lives--; resetCombo(); updateHearts();
  if (lives <= 0) gameOver();
}
function missItem(it){
  it.mode = 'fall'; it.vx = -beltSpeed()*0.4; it.vy = -60;
  dust(LAYOUT.belt.failX, beltY+24);
  floater(LAYOUT.belt.failX+60, beltY-56, 'MISS!', '#e23b3b', 28);
  SFX.miss();
  loseLife();
}

// ── 아이템 트윈 ──
function startResolve(it, tx, ty){
  it.mode = 'resolve';
  it.tw = { fx:it.x, fy:it.y, tx, ty, t:0, dur:.24 };
}
function startReturn(it){
  it.mode = 'return';
  const B = LAYOUT.belt;
  it.tw = { fx:it.x, fy:it.y, tx:clamp(it.x, B.failX+40, B.x1-60), ty:beltY, t:0, dur:.32 };
}
function removeItem(it){
  it.el.remove();
  const i = items.indexOf(it); if (i >= 0) items.splice(i, 1);
}

// ── HUD ──
function updateHearts(){
  [...heartsEl.children].forEach((h, i)=> h.classList.toggle('off', i >= lives));
}
function buildHearts(){
  heartsEl.innerHTML = '';
  for (let i=0; i<CONFIG.lives; i++){
    const h = document.createElement('div'); h.className = 'heart'; heartsEl.appendChild(h);
  }
}

// ── 메인 루프 ──
let last = performance.now();
function frame(now){
  const dt = clamp((now-last)/1000, 0, 0.033); last = now;
  if (state === 'playing') update(dt);
  drawParticles(dt);
  updateWorkerEyes();
  requestAnimationFrame(frame);
}
function update(dt){
  tPlay += dt;
  const sp = beltSpeed();

  // 라운드 타이머
  timeLeft = Math.max(0, timeLeft - dt);
  const sec = Math.ceil(timeLeft);
  timerEl.textContent = sec;
  timerEl.classList.toggle('low', timeLeft <= 10);
  if (timeLeft <= 10 && sec !== lastTickSec){ lastTickSec = sec; if (timeLeft > 0) SFX.tick(); }
  if (timeLeft <= 0){ gameOver('time'); return; }

  // 벨트 줄무늬 구동
  stripeOffset -= sp*dt;
  $('beltStripes').style.backgroundPosition = `${stripeOffset}px 0`;

  // 생성
  spawnTimer -= dt;
  if (spawnTimer <= 0){ spawnItem(); spawnTimer = spawnGap(); }

  // 아이템 갱신
  for (const it of [...items]){
    it.spawnT = Math.min(1, it.spawnT + dt*4);
    it.squash = Math.max(0, it.squash - dt*5);
    it.bob += dt*3;

    if (it.mode === 'belt'){
      it.x -= sp*dt;
      it.y = beltY + Math.sin(it.bob)*2.5;
      it.rot = Math.sin(it.bob*0.8)*2;
      if (it.x < LAYOUT.belt.failX) missItem(it);

    } else if (it.mode === 'drag'){
      const tx = pointer.x + it.grabDX, ty = pointer.y + it.grabDY;
      const k = Math.min(1, dt*16), sdt = Math.max(dt, 0.001);
      const nx = it.x + (tx-it.x)*k, ny = it.y + (ty-it.y)*k;
      it.vx = it.vx*0.7 + ((nx-it.x)/sdt)*0.3;
      it.vy = it.vy*0.7 + ((ny-it.y)/sdt)*0.3;
      it.x = nx; it.y = ny;
      it.rot = clamp(it.vx*0.018, -16, 16);

    } else if (it.mode === 'throw'){
      it.noHitT += dt;
      it.vy += CONFIG.gravity*dt;
      it.x += it.vx*dt; it.y += it.vy*dt;
      it.rot += it.vx*dt*0.12;
      const t = it.noHitT > 0.06 ? hitTarget(it) : null;
      if (t){ resolveDrop(it, t); continue; }
      const B = LAYOUT.belt;
      if (it.vy > 0 && it.y >= beltY && it.x > B.failX+20 && it.x < B.x1-40){
        it.y = beltY; it.mode = 'belt'; it.squash = 1;
        dust(it.x, beltY+26); SFX.drop();
      } else if (it.x < -80 || it.x > 1380 || it.y > 800){
        removeItem(it);
        floater(clamp(it.x, 80, 1200), 660, 'DROPPED!', '#e23b3b', 26);
        SFX.miss(); loseLife();
      }

    } else if (it.mode === 'return' || it.mode === 'resolve'){
      const tw = it.tw; tw.t += dt/tw.dur;
      const e = 1 - Math.pow(1 - Math.min(1, tw.t), 2);
      it.x = tw.fx + (tw.tx-tw.fx)*e;
      it.y = tw.fy + (tw.ty-tw.fy)*e;
      if (it.mode === 'resolve'){ it.fade = 1 - e; it.rot *= 0.9; }
      if (tw.t >= 1){
        if (it.mode === 'resolve'){ removeItem(it); continue; }
        it.mode = 'belt'; it.squash = 0.6;
      }

    } else if (it.mode === 'fall'){
      it.vy += CONFIG.gravity*dt;
      it.x += it.vx*dt; it.y += it.vy*dt;
      it.rot -= dt*220; it.fade -= dt*2.2;
      if (it.fade <= 0 || it.y > 820){ removeItem(it); continue; }
    }
    renderItem(it);
  }

  // 드롭 영역 하이라이트
  const hovering = drag ? hitTarget(drag) : null;
  for (const c of CATEGORIES)
    c.el.classList.toggle('hover', !!(hovering && hovering.type==='bin' && hovering.cat===c));
  trashEl.classList.toggle('open', !!(hovering && hovering.type==='trash'));
}
function renderItem(it){
  const pop = it.spawnT < 1 ? 0.55 + 0.45*(1-Math.pow(1-it.spawnT,3)) : 1;
  const sq = it.squash*0.18;
  const scl = pop*(it.mode==='resolve' ? (0.3 + 0.7*it.fade) : 1);
  it.el.style.opacity = it.fade;
  it.el.style.transform =
    `translate(${it.x}px,${it.y}px) translate(-50%,-50%) rotate(${it.rot}deg) scale(${scl*(1+sq)},${scl*(1-sq)})`;
}

// ── 직원 눈동자 — 포인터 추적 ──
const pupilL = $('pupilL'), pupilR = $('pupilR');
function updateWorkerEyes(){
  const wx = LAYOUT.worker.x, wy = LAYOUT.worker.y - 140;
  const a = Math.atan2(pointer.y - wy, pointer.x - wx);
  const ox = Math.cos(a)*3.2, oy = Math.sin(a)*3.2;
  pupilL.setAttribute('transform', `translate(${ox},${oy})`);
  pupilR.setAttribute('transform', `translate(${ox},${oy})`);
}

// ── 게임 흐름 ──
function showMenu(){
  state = 'menu';
  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <div class="card">
      <h1>WORD FACTORY</h1>
      <p>Words ride the conveyor belt!<br>
        <b>Drag</b> each word into its <b>category box</b> before it falls off.</p>
      <p style="color:#3f8f2f"><b>Misspelled words</b> are fakes — toss them in the <b>TRASH</b>!</p>
      <p class="small">You have <b>${CONFIG.duration} seconds</b> and ${CONFIG.lives} lives. You can throw words too — don't drop the products!</p>
      <button class="btn" id="startBtn">START</button>
    </div>`;
  $('startBtn').addEventListener('click', startGame);
}
function startGame(){
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
  for (const it of [...items]) removeItem(it);
  drag = null;
  score = 0; combo = 1; lives = CONFIG.lives; tPlay = 0; spawnTimer = 0.6;
  timeLeft = CONFIG.duration; lastTickSec = -1;
  timerEl.textContent = CONFIG.duration; timerEl.classList.remove('low');
  scoreEl.textContent = '0'; comboEl.textContent = '';
  buildHearts(); updateHearts();
  overlayEl.classList.add('hidden');
  state = 'playing';
}
function gameOver(reason){
  state = 'over';
  if (drag){ drag.el.classList.remove('drag'); drag = null; }
  const timeUp = reason === 'time';
  if (timeUp) SFX.timeup();
  const best = Math.max(score, +(localStorage.getItem('wordFactoryBest')||0));
  localStorage.setItem('wordFactoryBest', best);
  setTimeout(()=>{
    overlayEl.classList.remove('hidden');
    overlayEl.innerHTML = `
      <div class="card">
        <h1>${timeUp ? 'TIME UP!' : 'GAME OVER'}</h1>
        <p class="small">SCORE</p>
        <div class="big">${score}</div>
        <p class="small">BEST &nbsp;${best}</p>
        <button class="btn" id="retryBtn">RETRY</button>
      </div>`;
    $('retryBtn').addEventListener('click', startGame);
  }, 700);
}

buildHearts(); updateHearts();
showMenu();
if (location.hash === '#autostart') startGame();   // 스크린샷 테스트용
requestAnimationFrame(frame);
</script>
</body>
